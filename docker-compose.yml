version: '3.8'

services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2019-latest
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong!Passw0rd
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql

  neo4j:
    image: neo4j:4.4
    environment:
      - NEO4J_AUTH=neo4j/test
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data

  chromadb:
    image: chroma/chromadb:latest
    ports:
      - "8000:8000"

  backend:
    build: ./backend
    volumes:
      - ./backend:/app
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=mssql+pyodbc://sa:YourStrong!Passw0rd@mssql:1433/ksppolice?driver=ODBC+Driver+17+for+SQL+Server
      - OPENAI_API_KEY=
      - CHROMA_URL=http://chromadb:8000
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=test
    ports:
      - "8000:8000"
    depends_on:
      - mssql
      - chromadb
      - neo4j

  frontend:
    image: node:18
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: ["sh", "-c", "npm install && npm run dev -- --host 0.0.0.0 --port 3000"]
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mssql-data:
  neo4j-data:
