version: '3.8'
services:
  backend:
    build: ./backend
    image: ksp-crime-backend:latest
    container_name: ksp-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - chromadb
      - neo4j
      - mssql

  frontend:
    build: ./frontend
    image: ksp-crime-frontend:latest
    container_name: ksp-frontend
    ports:
      - "3000:5173"
    depends_on:
      - backend

  chromadb:
    image: chroma/chroma:latest
    container_name: ksp-chromadb
    ports:
      - "8001:8000"

  neo4j:
    image: neo4j:5
    container_name: ksp-neo4j
    environment:
      - NEO4J_AUTH=neo4j/neo4jpassword
    ports:
      - "7474:7474"
      - "7687:7687"

  mssql:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: ksp-mssql
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong!Passw0rd
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql

volumes:
  mssql-data:
